<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expedition Portal | Mission Brief</title>
    <link rel="stylesheet" href="top_secret/styles/styles.css">
</head>
<script>
	// --- SECTION 1: THE COUNTDOWN CLOCK ---
const targetDate = new Date("June 14, 2026 17:00:00").getTime();

const timer = setInterval(function() {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    // Only update if the elements exist on the page
    if(document.getElementById("days")) {
        document.getElementById("days").innerHTML = days;
        document.getElementById("hours").innerHTML = hours;
        document.getElementById("minutes").innerHTML = minutes;
        document.getElementById("seconds").innerHTML = seconds;
    }

if (distance < 0) {
    clearInterval(timer);
    // This replaces the clock with a styled button leading to your first clue
    document.getElementById("countdown-clock").innerHTML = `
      <div style="text-align:center; margin-top:20px;">
        <a href="top_secret/pin-lock.html" class="unlock-btn">ACCESS BRIEFING: MISSION START</a>
      </div>
    `;
  }
}, 1000);


// --- SECTION 2: THE CODE STREAM ---
const codeSnippets = [
    "import { vault } from 'secret_location';",
    "const access_key = Math.random().toString(36);",
    "if (user.isAdventurer) { unlock(destination); }",
    "connecting to satellite... [OK]",
    "bypassing firewall... ERROR: 404",
    "payload.deploy('scavenger_hunt_v1.8');",
    "pinging coordinates: 44°05'04.5\"N 121°22'34.5\"W",
    "let password = 'vacation_reveal_2026';",
    "Decrypting data stream...",
    "System.out.println('Finding Clue...');",
    "git commit -m 'hiding clues from Ashley'",
	"REBOOTING_CORE_FRMWRE: Progress 69%...",
	"npm install --save laborday-vibes-2026",
	"bypassing_security_node_07... ACCESS GRANTED.",
	"DECRYPTING_STRING: 'First met at the park, remember?'",
	"Searching local files for 'Itinerary_Draft.pdf'..."

];

function streamCode() {
    // Move this line inside the function
    const terminal = document.getElementById("hacker-terminal");
    
    if (!terminal) return; 
    
    const line = document.createElement("div");
    const randomLine = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
    
    line.textContent = `> ${randomLine}`;
    terminal.appendChild(line);

    if (terminal.childNodes.length > 20) {
        terminal.removeChild(terminal.firstChild);
    }

    terminal.scrollTop = terminal.scrollHeight;
}

function startStreaming() {
    streamCode();
    let randomDelay = Math.floor(Math.random() * 50) + 300;
    setTimeout(startStreaming, randomDelay);
}

startStreaming();
</script>
<body>
    <div class="classification-banner">
        TOP SECRET <span class="compartment"> // SI-TK // NOFORN</span>
    </div>


    <div class="terminal-container">
        <header class="terminal-header">
            <div class="status-indicator">
                <span class="pulse-dot" style="background-color: red; box-shadow: 0 0 8px red;"></span>
                <span class="status-text">SYSTEM INACTIVE // SECURITY LOCKDOWN</span>
            </div>
            <h1>Mission Briefing</h1>
			<h2 class="loading-text">Decrypting<span class="dots"></span></h2>
            <p class="coords">Estimated Date of Decryption: <br><em>June 14, 2026 1700</em></p>
        </header>

        <main>
            <section class="mission-brief">
				<div id="countdown-clock">
				<div><span id="days">00</span><p>Days</p></div>
				<div><span id="hours">00</span><p>Hours</p></div>
				<div><span id="minutes">00</span><p>Minutes</p></div>
				<div><span id="seconds">00</span><p>Seconds</p></div>
				</div>	
            </section>

            <section class="code-window">
                <div class="window-controls">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>

				<div class="code-window" id="hacker-terminal"></div>
            </section>
			

            <!-- <div class="action-bar"> -->
                <!-- <a href="pin-lock.html" class="btn">Mission Brief</a> -->
            <!-- </div> -->
        </main>

        <footer>
            <p>PROPERTY OF THE JOINT ADVENTURE COMMAND // UNAUTHORIZED ACCESS PROHIBITED // 2026</p>
        </footer>
    </div>
</body>
</html>
